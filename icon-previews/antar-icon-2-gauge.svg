<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <defs>
    <clipPath id="mask2"><circle cx="54" cy="54" r="36"/></clipPath>
    <linearGradient id="prog2" x1="37" y1="71" x2="71" y2="37" gradientUnits="userSpaceOnUse">
      <stop stop-color="#448AFF"/><stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#mask2)">
    <!-- background layer (full bleed) -->
    <rect width="108" height="108" fill="#0A0E21"/>
    <circle cx="54" cy="54" r="31" fill="none" stroke="#111631" stroke-width="6"/>
    <!-- gauge track 270° -->
    <path d="M37 71 A24 24 0 1 1 71 71" fill="none" stroke="#1A1F3D" stroke-width="5" stroke-linecap="round"/>
    <!-- progress 180° -->
    <path d="M37 71 A24 24 0 1 1 71 37" fill="none" stroke="url(#prog2)" stroke-width="5" stroke-linecap="round"/>
    <!-- ticks -->
    <path stroke="#F0F0F5" stroke-width="1.2" stroke-linecap="round" opacity=".4" d="M54 28v4"/>
    <path stroke="#F0F0F5" stroke-width="1.2" stroke-linecap="round" opacity=".4" d="M35.6 35.6l2.8 2.8"/>
    <path stroke="#F0F0F5" stroke-width="1.2" stroke-linecap="round" opacity=".4" d="M72.4 35.6l-2.8 2.8"/>
    <!-- needle -->
    <path stroke="#F0F0F5" stroke-width="2" stroke-linecap="round" d="M54 54 L64.2 43.8"/>
    <circle cx="54" cy="54" r="3.2" fill="#448AFF"/>
    <!-- the one pop: purple needle tip node -->
    <circle cx="65.3" cy="42.7" r="5.8" fill="#B388FF" opacity=".3"/>
    <circle cx="65.3" cy="42.7" r="2.4" fill="#B388FF"/>
    <!-- readout bar -->
    <rect x="46" y="66" width="16" height="3" rx="1.5" fill="#F0F0F5" opacity=".2"/>
  </g>
</svg>
