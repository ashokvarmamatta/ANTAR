<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <rect width="120" height="120" fill="#0A0E21"/>
  <!-- faint scan ripple -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#448AFF" stroke-width="1.2" opacity=".14"/>
  <!-- antenna emitter (pop) -->
  <path stroke="#F0F0F5" stroke-width="1.5" stroke-linecap="round" d="M60 28 V19"/>
  <circle cx="60" cy="17" r="5.4" fill="#B388FF" opacity=".3"/>
  <circle cx="60" cy="17" r="2.4" fill="#B388FF"/>
  <!-- phone -->
  <rect x="44" y="28" width="32" height="64" rx="7" fill="#161B35" stroke="#448AFF" stroke-width="2.2"/>
  <rect x="48" y="34" width="24" height="52" rx="4" fill="#0A0E21"/>
  <!-- already-scanned rows (revealed as scan passes) -->
  <rect x="52" y="40" width="16" height="2.6" rx="1.3" fill="#F0F0F5" opacity=".55"/>
  <rect x="52" y="46.5" width="11" height="2.6" rx="1.3" fill="#00E5FF" opacity=".75"/>
  <rect x="52" y="53" width="14" height="2.6" rx="1.3" fill="#F0F0F5" opacity=".4"/>
  <!-- scan zone + scan line (animates top->bottom) -->
  <rect x="48" y="34" width="24" height="26" fill="#00E5FF" opacity=".07"/>
  <path stroke="#00E5FF" stroke-width="5" stroke-linecap="round" opacity=".22" d="M49.5 60 H70.5"/>
  <path stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round" d="M49.5 60 H70.5"/>
  <!-- unscanned rows below (dim) -->
  <rect x="52" y="66" width="13" height="2.6" rx="1.3" fill="#F0F0F5" opacity=".1"/>
  <rect x="52" y="72.5" width="16" height="2.6" rx="1.3" fill="#F0F0F5" opacity=".08"/>
  <!-- extracted info card, left (cpu reading) -->
  <rect x="10" y="38" width="24" height="17" rx="3.5" fill="#111631" stroke="#1A1F3D" stroke-width="1"/>
  <rect x="13.5" y="42" width="12" height="2.4" rx="1.2" fill="#00E5FF" opacity=".8"/>
  <rect x="13.5" y="47.5" width="17" height="2.4" rx="1.2" fill="#F0F0F5" opacity=".25"/>
  <path stroke="#F0F0F5" stroke-width="1.4" stroke-linecap="round" d="M44 46 L34 46"/>
  <circle cx="39" cy="46" r="1.7" fill="#00E5FF"/>
  <!-- extracted info card, right (battery reading) -->
  <rect x="86" y="60" width="24" height="17" rx="3.5" fill="#111631" stroke="#1A1F3D" stroke-width="1"/>
  <rect x="89.5" y="64" width="14" height="2.4" rx="1.2" fill="#448AFF" opacity=".9"/>
  <rect x="89.5" y="69.5" width="10" height="2.4" rx="1.2" fill="#F0F0F5" opacity=".25"/>
  <path stroke="#F0F0F5" stroke-width="1.4" stroke-linecap="round" d="M76 68 L86 68"/>
  <circle cx="81" cy="68" r="1.7" fill="#448AFF"/>
  <!-- downlink to storage chip -->
  <path stroke="#F0F0F5" stroke-width="1.4" stroke-linecap="round" d="M60 92 V100"/>
  <rect x="56.5" y="100" width="7" height="7" rx="1.4" fill="#00E5FF"/>
  <circle cx="60" cy="96" r="1.7" fill="#00E5FF"/>
  <!-- dust -->
  <path fill="#00E5FF" stroke="#00E5FF" stroke-width=".5" d="M28 76c.414-.021.824-.327.801-.776-.023-.448-.462-.71-.877-.689-.414.022-.824.327-.8.776.022.449.461.71.876.689Z"/>
  <path fill="#448AFF" stroke="#448AFF" stroke-width=".5" d="M92 38c.414-.021.824-.327.801-.776-.023-.448-.462-.71-.877-.689-.414.022-.824.327-.8.776.022.449.461.71.876.689Z"/>
</svg>
